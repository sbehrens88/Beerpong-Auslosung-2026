<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>🏓 Beerpong Turnier - Gruppenauslosung</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  background:#0a0a0f;font-family:Arial,sans-serif;color:#fff;
  display:flex;flex-direction:column;align-items:center;
  min-height:100vh;overflow-y:auto;
  user-select:none;-webkit-tap-highlight-color:transparent;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 20%,rgba(255,215,0,0.08) 0%,transparent 60%);
  pointer-events:none;
}
.wrap{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  gap:22px;padding:28px 20px 60px;width:100%;max-width:460px;text-align:center;
}
.logo{font-size:.75rem;letter-spacing:4px;color:rgba(255,215,0,0.4);text-transform:uppercase;}
.page-title{
  font-size:clamp(1.6rem,7vw,2.4rem);font-weight:900;
  background:linear-gradient(135deg,#ffd700,#ff8c00,#ff4500);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:3px;animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{filter:brightness(1);}50%{filter:brightness(1.4);}}
.selector-box{
  width:100%;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,215,0,0.25);border-radius:20px;padding:24px;
  display:flex;flex-direction:column;gap:16px;
}
.selector-label{font-size:.75rem;letter-spacing:3px;color:rgba(255,255,255,0.35);text-transform:uppercase;}
.team-select{
  background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.2);
  border-radius:12px;color:#fff;padding:14px 16px;
  font-size:1rem;font-weight:700;cursor:pointer;outline:none;width:100%;
}
.team-select:focus{border-color:#ffd700;}
.team-select option{background:#1a1a2e;}
.go-btn{
  padding:16px;width:100%;
  background:linear-gradient(135deg,#ffd700,#ff8c00);
  border:none;border-radius:50px;
  color:#0a0a0f;font-size:1.05rem;font-weight:900;
  letter-spacing:2px;cursor:pointer;text-transform:uppercase;
  box-shadow:0 0 30px rgba(255,215,0,0.4);
  animation:btnpulse 1.5s ease-in-out infinite;
  transition:transform .15s;
}
@keyframes btnpulse{
  0%,100%{box-shadow:0 0 25px rgba(255,215,0,0.4);}
  50%{box-shadow:0 0 55px rgba(255,215,0,0.9);transform:scale(1.02);}
}
.go-btn:disabled{opacity:.3;cursor:default;animation:none;transform:none;}
.go-btn:not(:disabled):active{transform:scale(0.97)!important;}

/* ===== SLOT MACHINE SCREEN ===== */
.machine-screen{display:none;flex-direction:column;align-items:center;gap:18px;width:100%;}

.spin-status{
  font-size:.85rem;font-weight:700;letter-spacing:2px;
  color:rgba(255,215,0,0.8);text-transform:uppercase;min-height:22px;text-align:center;
}

/* Cabinet */
.cabinet-wrap{position:relative;display:inline-block;}
.cabinet{
  position:relative;
  width:min(76vw,300px);
  background:linear-gradient(160deg,#2c1d06,#1a1000,#0f0800);
  border:3px solid #8b6914;
  border-radius:22px 22px 16px 16px;
  padding:16px 16px 20px;
  box-shadow:
    0 0 0 1px #ffd70033,
    0 0 60px rgba(255,180,0,0.18),
    inset 0 2px 0 rgba(255,215,0,0.12),
    inset 0 -2px 0 rgba(0,0,0,0.4);
}
.cabinet-top-bar{
  background:linear-gradient(90deg,#6b4e10,#ffd700,#e8a800,#ffd700,#6b4e10);
  border-radius:10px 10px 0 0;
  height:8px;margin:-16px -16px 14px;
  box-shadow:0 0 18px rgba(255,215,0,0.6);
}
.cabinet-label{
  font-size:.6rem;letter-spacing:5px;color:#ffd700;
  text-transform:uppercase;text-align:center;
  margin-bottom:12px;opacity:.75;
}
/* reel frame */
.reel-frame{
  background:#000;
  border:3px solid #4a3208;
  border-radius:12px;
  padding:5px;
  box-shadow:inset 0 0 30px rgba(0,0,0,0.95), 0 0 18px rgba(255,180,0,0.08);
  position:relative;
}
.reel-frame::before,.reel-frame::after{
  content:'';position:absolute;left:5px;right:5px;height:52px;z-index:5;pointer-events:none;border-radius:7px;
}
.reel-frame::before{top:5px;background:linear-gradient(to bottom,#000 10%,transparent);}
.reel-frame::after{bottom:5px;background:linear-gradient(to top,#000 10%,transparent);}
.reel-window{height:140px;overflow:hidden;border-radius:7px;position:relative;}
.reel{display:flex;flex-direction:column;will-change:transform;}
.reel-item{
  height:140px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
}
.reel-letter{font-size:3.8rem;font-weight:900;line-height:1;}
.reel-gname{font-size:.65rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;opacity:.9;}
.reel-lines{
  position:absolute;top:50%;transform:translateY(-50%);
  left:0;right:0;height:140px;
  border-top:3px solid rgba(255,215,0,0.85);
  border-bottom:3px solid rgba(255,215,0,0.85);
  pointer-events:none;z-index:6;
  box-shadow:0 -1px 14px rgba(255,215,0,0.4),0 1px 14px rgba(255,215,0,0.4);
}
/* bottom lights */
.lights-row{
  display:flex;justify-content:center;gap:8px;margin-top:12px;
}
.dlight{
  width:10px;height:10px;border-radius:50%;
  animation:lblink 1.1s ease-in-out infinite;
}
.dlight:nth-child(1){background:#ff3300;box-shadow:0 0 7px #ff3300;}
.dlight:nth-child(2){background:#ffd700;box-shadow:0 0 7px #ffd700;animation-delay:.37s;}
.dlight:nth-child(3){background:#00cc44;box-shadow:0 0 7px #00cc44;animation-delay:.74s;}
.dlight:nth-child(4){background:#ff3300;box-shadow:0 0 7px #ff3300;animation-delay:1.1s;}
.dlight:nth-child(5){background:#ffd700;box-shadow:0 0 7px #ffd700;animation-delay:1.47s;}
@keyframes lblink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* ===== LEVER ===== */
.lever-outer{
  position:absolute;
  right:-44px;
  top:16px;
  width:40px;
  display:flex;flex-direction:column;align-items:center;
  cursor:pointer;
  z-index:10;
  touch-action:none;
}
.lever-hint{
  font-size:.58rem;letter-spacing:2px;color:rgba(255,180,0,0.65);
  text-transform:uppercase;
  writing-mode:vertical-lr;text-orientation:mixed;
  transform:rotate(180deg);
  height:60px;margin-bottom:4px;
  animation:hblink 1.4s ease-in-out infinite;
}
@keyframes hblink{0%,100%{opacity:.35;}50%{opacity:1;}}
.lever-rod-wrap{
  position:relative;
  width:10px;
  height:160px;
  display:flex;align-items:flex-end;justify-content:center;
}
.lever-rod{
  width:8px;
  height:150px;
  background:linear-gradient(90deg,#a07820,#ffd700,#c89030,#ffd700,#a07820);
  border-radius:4px;
  position:absolute;
  bottom:0;
  transform-origin:bottom center;
  transform:rotate(20deg);
  transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);
  box-shadow:2px 0 8px rgba(0,0,0,0.6);
}
.lever-ball{
  width:28px;height:28px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#ff8844,#cc1100);
  border:2px solid #ff4422;
  box-shadow:0 0 16px rgba(255,80,0,0.8),inset 0 2px 5px rgba(255,255,255,0.35);
  position:absolute;
  top:-14px;
  left:50%;transform:translateX(-50%);
  transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
}
.lever-base{
  width:30px;height:18px;
  background:linear-gradient(180deg,#5a4010,#3a2800);
  border:2px solid #8b6914;
  border-radius:5px;
  margin-top:2px;
  box-shadow:0 0 8px rgba(255,180,0,0.15);
}
/* pulled state */
.lever-outer.pulled .lever-rod{transform:rotate(-20deg);}
.lever-outer.pulled .lever-ball{box-shadow:0 0 8px rgba(255,80,0,0.3);}
.lever-outer.pulled .lever-hint{display:none;}
.lever-outer.locked{cursor:default;}

/* countdown */
.countdown-wrap{display:none;flex-direction:column;align-items:center;gap:4px;}
.cring{position:relative;width:68px;height:68px;}
.cring svg{transform:rotate(-90deg);}
.cring circle{fill:none;stroke:rgba(255,215,0,0.12);stroke-width:5;}
.cring .prog{stroke:#ffd700;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 0.4s linear;}
.cring-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:900;color:#ffd700;}

/* result */
.result-area{
  display:none;flex-direction:column;align-items:center;
  gap:20px;width:100%;animation:fadeUp .7s ease-out;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.group-badge{padding:22px 48px;border-radius:20px;display:flex;flex-direction:column;align-items:center;gap:6px;}
.big-letter{font-size:clamp(4rem,18vw,6rem);font-weight:900;line-height:1;animation:glow 2s ease-in-out infinite;}
@keyframes glow{0%,100%{filter:brightness(1);}50%{filter:brightness(1.6) drop-shadow(0 0 24px currentColor);}}
.big-gname{font-size:clamp(1rem,4vw,1.4rem);font-weight:700;letter-spacing:3px;}
.congrats{font-size:.95rem;font-weight:600;color:rgba(255,255,255,0.55);line-height:1.8;}
.mates-box{width:100%;border-radius:16px;padding:20px;background:rgba(255,255,255,0.03);}
.mates-title{font-size:.65rem;letter-spacing:3px;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.07);text-align:center;}
.mate-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:7px;font-size:.9rem;font-weight:700;opacity:0;transform:translateX(-20px);transition:opacity 0.4s ease,transform 0.4s ease;}
.mate-row.visible{opacity:1;transform:translateX(0);}
.beers{display:flex;gap:10px;font-size:1.8rem;justify-content:center;animation:wave 1.2s ease-in-out infinite;}
@keyframes wave{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.reset-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:50px;color:rgba(255,255,255,0.5);font-size:.8rem;font-weight:700;letter-spacing:2px;padding:12px 28px;cursor:pointer;text-transform:uppercase;transition:all .25s;}
.reset-btn:hover{background:rgba(255,255,255,0.12);color:#fff;}
.fw-c{position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden;}
.fw{position:absolute;border-radius:50%;animation:fwE 1s ease-out forwards;}
@keyframes fwE{0%{opacity:1;transform:translate(0,0);}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0);}}
@media(max-width:520px){.sm-lever{right:-46px!important;width:52px!important;}.lever-knob{width:42px!important;height:42px!important;top:-21px!important;box-shadow:0 0 30px rgba(255,215,0,1),0 0 55px rgba(255,140,0,.7),inset 0 2px 3px rgba(255,255,255,.4)!important;}.lever-rod{width:15px!important;box-shadow:0 0 22px rgba(255,215,0,.9)!important;}.lever-hint{font-size:.8rem!important;font-weight:800!important;color:#ffd700!important;}}
.other-groups-btn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.2);border-radius:50px;color:rgba(255,255,255,.6);font-size:.8rem;font-weight:700;letter-spacing:2px;padding:10px 24px;cursor:pointer;text-transform:uppercase;transition:all .25s;}
.other-groups-btn:hover{background:rgba(255,255,255,.12);color:#fff;}
.other-groups-panel{display:none;width:100%;border-radius:14px;overflow:hidden;border:1px solid rgba(255,215,0,.2);margin-top:4px;}
.og-group{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.06);}
.og-group:last-child{border-bottom:none;}
.og-head{font-size:.72rem;font-weight:900;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;}
.og-team{font-size:.85rem;padding:5px 0;opacity:.75;display:flex;align-items:center;gap:8px;}
@keyframes coinDrop{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(60px) scale(.4);}}
.coin-slot-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.coin-slot-wrap.coin-ready .coin-slot{border-color:#ffd700!important;animation:coinGlow 1s ease-in-out infinite;}
.coin-slot-wrap.coin-inserted .coin-slot{border-color:#00ff88!important;box-shadow:0 0 12px #00ff88!important;}
@keyframes coinGlow{0%,100%{box-shadow:0 0 6px #ffd700;}50%{box-shadow:0 0 22px #ffd700;}}
#teamDisplay{display:none;font-size:clamp(.95rem,4vw,1.3rem);font-weight:900;letter-spacing:3px;text-align:center;margin:5px 0 2px;padding:7px 22px;border-radius:50px;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.35);color:#ffd700;}
</style>
</head>
<body>

<div class="fw-c" id="fwc"></div>
<div class="wrap">
  <div class="logo">🏓 Beerpong Turnier 2026</div>
  <div id="teamDisplay"></div>
  <div class="page-title">🎰 AUSLOSUNG</div>

  <div class="selector-box" id="selectorBox">
    <div class="selector-label">👇 Welches Team bist du?</div>
    <select class="team-select" id="teamSelect" onchange="onTeamSelect()">
      <option value="">-- Team auswählen --</option>
    </select>
    <button class="go-btn" id="goBtn" onclick="goToMachine()" disabled>🎰 ZUR SLOT MACHINE!</button>
  </div>

  <div class="machine-screen" id="machineScreen">
    <div class="spin-status" id="spinStatus">👆 Zieh den Hebel!</div>

    <div class="cabinet-wrap">
      <div class="cabinet">
        <div class="cabinet-top-bar"></div>
        <div class="cabinet-label">🎰 GRUPPEN SLOT 🎰</div>
        <div class="reel-frame">
          <div class="reel-window">
            <div class="reel" id="reel"></div>
          </div>
          <div class="reel-lines"></div>
        </div>
        <div class="lights-row">
          <div class="dlight"></div><div class="dlight"></div><div class="dlight"></div>
          <div class="dlight"></div><div class="dlight"></div>
        </div>
      </div>
      <div class="lever-outer" id="leverWrap" onclick="pullLever()">
        <div class="lever-hint" id="leverHint">ZIEHEN</div>
        <div class="lever-rod-wrap">
          <div class="lever-rod" id="leverRod">
            <div class="lever-ball" id="leverBall"></div>
          </div>
        </div>
        <div class="lever-base"></div>
      </div>
    </div>

    <div class="countdown-wrap" id="countdownWrap">
      <div class="cring">
        <svg width="68" height="68" viewBox="0 0 68 68">
          <circle cx="34" cy="34" r="29"/>
          <circle class="prog" id="progCircle" cx="34" cy="34" r="29" stroke-dasharray="182" stroke-dashoffset="0"/>
        </svg>
        <div class="cring-num" id="countNum">30</div>
      </div>
    </div>
  </div>

  <div class="result-area" id="resultArea">
    <div class="group-badge" id="groupBadge">
      <div class="big-letter" id="bigLetter"></div>
      <div class="big-gname" id="bigGname"></div>
    </div>
    <div class="congrats" id="congratsTxt"></div>
    <div class="mates-box" id="matesBox" style="display:none">
      <div class="mates-title">👥 Eure Gruppe</div>
      <div id="matesList"></div>
    </div>
    <div class="beers">🍺🏓🏆🏓🍺</div>
    <button class="other-groups-btn" onclick="toggleOtherGroups(this)">👁 Andere Gruppen anzeigen</button>
    <div class="other-groups-panel" id="otherGroupsPanel"></div>
    <button class="reset-btn" onclick="resetPage()">↩ Anderes Team</button>
  </div>
</div>

<script>
(function(){
  var RESULTS = [{"team":"Die Bouncer","groupIdx":0,"groupMembers":["Die Bouncer","Nass & Spaß","Golden Cups","Die Bierkönige","Biber am Ball","Shot Stars"]},{"team":"Triple Threat","groupIdx":1,"groupMembers":["Triple Threat","Prost Pals","Hopfen & Malz","Schaum Alarm","Schaumkronen FC","Die Untrinkbaren"]},{"team":"Nass & Spaß","groupIdx":0,"groupMembers":["Die Bouncer","Nass & Spaß","Golden Cups","Die Bierkönige","Biber am Ball","Shot Stars"]},{"team":"Prost Pals","groupIdx":1,"groupMembers":["Triple Threat","Prost Pals","Hopfen & Malz","Schaum Alarm","Schaumkronen FC","Die Untrinkbaren"]},{"team":"Golden Cups","groupIdx":0,"groupMembers":["Die Bouncer","Nass & Spaß","Golden Cups","Die Bierkönige","Biber am Ball","Shot Stars"]},{"team":"Hopfen & Malz","groupIdx":1,"groupMembers":["Triple Threat","Prost Pals","Hopfen & Malz","Schaum Alarm","Schaumkronen FC","Die Untrinkbaren"]},{"team":"Die Bierkönige","groupIdx":0,"groupMembers":["Die Bouncer","Nass & Spaß","Golden Cups","Die Bierkönige","Biber am Ball","Shot Stars"]},{"team":"Schaum Alarm","groupIdx":1,"groupMembers":["Triple Threat","Prost Pals","Hopfen & Malz","Schaum Alarm","Schaumkronen FC","Die Untrinkbaren"]},{"team":"Biber am Ball","groupIdx":0,"groupMembers":["Die Bouncer","Nass & Spaß","Golden Cups","Die Bierkönige","Biber am Ball","Shot Stars"]},{"team":"Schaumkronen FC","groupIdx":1,"groupMembers":["Triple Threat","Prost Pals","Hopfen & Malz","Schaum Alarm","Schaumkronen FC","Die Untrinkbaren"]},{"team":"Shot Stars","groupIdx":0,"groupMembers":["Die Bouncer","Nass & Spaß","Golden Cups","Die Bierkönige","Biber am Ball","Shot Stars"]},{"team":"Die Untrinkbaren","groupIdx":1,"groupMembers":["Triple Threat","Prost Pals","Hopfen & Malz","Schaum Alarm","Schaumkronen FC","Die Untrinkbaren"]}];
  var GNAMES  = ["Gruppe A","Gruppe B"];
  var COLORS  = ["#ff7070","#7aaaff","#70ff70","#ffd070"];
  var BG      = ["rgba(255,80,80,0.15)","rgba(80,140,255,0.15)","rgba(80,220,80,0.15)","rgba(255,190,60,0.15)"];
  var ITEM_H  = 140;

  var sel = document.getElementById('teamSelect');
  RESULTS.forEach(function(r){
    var o = document.createElement('option');
    o.value = r.team; o.textContent = r.team;
    sel.appendChild(o);
  });

  window.onTeamSelect = function(){
    document.getElementById('goBtn').disabled = sel.value === '';
    var td=document.getElementById('teamDisplay');
    if(sel.value!==''){if(td){td.textContent='👤 '+sel.value;td.style.display='block';}}else{if(td){td.style.display='none';}}
  };

  var currentEntry = null;
  var leverPulled  = false;
  var coinInserted = false;

  window.goToMachine = function(){
    var name = sel.value; if(!name) return;
    currentEntry = RESULTS.find(function(r){ return r.team === name; });
    if(!currentEntry) return;
    coinInserted=true;
    var csw=document.getElementById('coinSlotWrap');
    if(csw){csw.classList.remove('coin-inserted');csw.classList.add('coin-ready');}
    var cl=document.getElementById('coinLabel');if(cl){cl.textContent='🪙 INSERT COIN';}
    document.getElementById('selectorBox').style.display='none';
    document.getElementById('machineScreen').style.display='flex';
    buildReel(currentEntry);
  };
  window.insertCoin=function(){
    if(coinInserted||!currentEntry)return;
    coinInserted=true;
    var csw=document.getElementById('coinSlotWrap');
    var cl=document.getElementById('coinLabel');
    if(csw){csw.classList.remove('coin-ready');csw.classList.add('coin-inserted');}
    if(cl){cl.textContent='✅ EINGEWORFEN';}
    var coin=document.createElement('div');
    coin.style.cssText='position:fixed;font-size:1.8rem;z-index:9999;pointer-events:none;animation:coinDrop .65s ease-in forwards;';
    coin.textContent='🪙';
    var slot=document.getElementById('coinSlot');
    if(slot){var r=slot.getBoundingClientRect();coin.style.left=(r.left+r.width/2-14)+'px';coin.style.top=r.top+'px';}
    document.body.appendChild(coin);
    setTimeout(function(){coin.remove();},800);
  };

  function buildReel(entry){
    var nGroups = GNAMES.length;
    var gIdx    = entry.groupIdx;
    var items   = [];

    // Phase 1: fast spin (800 items)
    for(var i=0;i<800;i++) items.push(i % nGroups);

    // Phase 2: fake settle on WRONG group (slow down, almost stop)
    var fakeG = (gIdx + Math.floor(nGroups/2)) % nGroups;
    for(var f=0;f<3;f++) items.push((fakeG - 1 + f + nGroups) % nGroups);

    // Phase 3: re-accelerate (2 full cycles)
    for(var r2=0;r2<nGroups*2;r2++) items.push((fakeG + 1 + r2) % nGroups);

    // Phase 4: slow down to correct group
    items.push((gIdx - 2 + nGroups) % nGroups);
    items.push((gIdx - 1 + nGroups) % nGroups);
    items.push(gIdx);

    var reel = document.getElementById('reel');
    reel.innerHTML = '';
    items.forEach(function(g){
      var el = document.createElement('div'); el.className = 'reel-item';
      el.innerHTML = '<div class="reel-letter" style="color:'+COLORS[g]+';text-shadow:0 0 18px '+COLORS[g]+'88">'+String.fromCharCode(65+g)+'</div>'
        + '<div class="reel-gname" style="color:'+COLORS[g]+'">'+GNAMES[g]+'</div>';
      reel.appendChild(el);
    });
    reel.style.transition = 'none';
    reel.style.transform   = 'translateY(0)';
    window._reelItems = items;
    window._reelTotal = items.length;
  }

  window.pullLever = function(){
    if(leverPulled || !currentEntry) return;
    leverPulled = true;
    document.getElementById('leverWrap').classList.add('pulled','locked');
    document.getElementById('spinStatus').textContent = '🎰 Dreht sich...';
    document.getElementById('countdownWrap').style.display = 'flex';
    setTimeout(function(){ runSpin(currentEntry); }, 450);
  };

  function runSpin(entry){
    var items    = window._reelItems;
    var total    = window._reelTotal;
    var targetIdx= total - 1;
    var nGroups  = GNAMES.length;
    var reel     = document.getElementById('reel');

    var schedule = [];
    var t = 0;

    // FAST: 800 items at 33ms each (~26.4s)
    for(var i=0;i<800;i++){
      t += 33;
      schedule.push({idx:i+1,delay:t});
    }

    // FAKE SETTLE: 3 items, slowing 250 → 500 → 900ms
    var fakeSlows = [250, 500, 900];
    for(var f=0;f<3;f++){
      t += fakeSlows[f];
      schedule.push({idx:800+f+1,delay:t});
    }
    var fakePauseAt = t;

    // RE-ACCELERATE: nGroups*2 items, speeds 600 down to 55ms
    var reItems = nGroups*2;
    for(var r2=0;r2<reItems;r2++){
      var spd = Math.max(55, 600 - Math.floor(r2*(545/reItems)));
      t += spd;
      schedule.push({idx:803+r2+1,delay:t});
    }

    // FINAL SLOW: 3 items
    var finalSlows = [280, 520, 850];
    for(var s=0;s<3;s++){
      t += finalSlows[s];
      schedule.push({idx:803+reItems+s+1,delay:t});
    }

    var totalMs = t;

    // Apply all steps
    schedule.forEach(function(sc){
      setTimeout(function(){
        reel.style.transition = 'transform 0.07s ease-out';
        reel.style.transform  = 'translateY(-'+(sc.idx*ITEM_H)+'px)';
      }, sc.delay);
    });

    // Final bounce snap
    setTimeout(function(){
      reel.style.transition = 'transform 0.7s cubic-bezier(0.175,0.885,0.32,1.45)';
      reel.style.transform  = 'translateY(-'+(targetIdx*ITEM_H)+'px)';
    }, totalMs + 130);

    // Status messages
    var msgs = [
      '🎰 Dreht sich...','🍺 Beerpong Spirit!','Spannung steigt...',
      '😬 Fast!','😲 Ohh — nochmal!','🔄 Nochmal!','🎯 Jetzt wirklich...','🎉 Gleich!'
    ];
    var mIdx = 0;
    var statusEl = document.getElementById('spinStatus');
    var statusInt = setInterval(function(){
      mIdx = (mIdx+1) % msgs.length;
      statusEl.textContent = msgs[mIdx];
    }, 4200);
    // fake-settle moment messages
    setTimeout(function(){ statusEl.textContent = '😮 Fast da...'; }, fakePauseAt - 300);
    setTimeout(function(){ statusEl.textContent = '😱 Nochmal!!'; }, fakePauseAt + 400);

    // Countdown
    var circ  = document.getElementById('progCircle');
    var numEl = document.getElementById('countNum');
    var circumference = 182;
    var countStart = Date.now();
    numEl.textContent = Math.ceil(totalMs/1000);
    var countInt = setInterval(function(){
      var el2 = (Date.now()-countStart)/1000;
      var rem  = Math.max(0, totalMs/1000 - el2);
      numEl.textContent = Math.ceil(rem);
      circ.style.strokeDashoffset = String(circumference*(el2/(totalMs/1000)));
      if(rem<=0) clearInterval(countInt);
    }, 120);

    // Show result
    setTimeout(function(){
      clearInterval(statusInt);
      clearInterval(countInt);
      showResult(entry);
    }, totalMs + 1300);
  }

  function showResult(entry){
    var gIdx   = entry.groupIdx;
    var gName  = GNAMES[gIdx];
    var gColor = COLORS[gIdx];
    var gBg    = BG[gIdx];
    var gLetter= String.fromCharCode(65+gIdx);
    var teamName = entry.team;
    var mates  = (entry.groupMembers||[]).filter(function(t){ return t!==entry.team; });

    document.getElementById('machineScreen').style.display = 'none';
    var td=document.getElementById('teamDisplay');if(td){td.textContent='👤 '+teamName;td.style.display='block';}

    var badge = document.getElementById('groupBadge');
    badge.style.border     = '2px solid '+gColor;
    badge.style.background = gBg;
    badge.style.boxShadow  = '0 0 60px '+gColor+'44';
    document.getElementById('bigLetter').textContent = gLetter;
    document.getElementById('bigLetter').style.color = gColor;
    document.getElementById('bigGname').textContent  = gName;
    document.getElementById('bigGname').style.color  = gColor;
    document.getElementById('congratsTxt').innerHTML =
      'Willkommen in der <strong style="color:'+gColor+'">'+gName+'</strong>!<br>Viel Spaß &mdash; auf Bier &amp; Bronze! 🍺🏆';

    document.getElementById('resultArea').style.display = 'flex';
    fw(gColor);fw(gColor);
    setTimeout(function(){fw(gColor);},600);
    setTimeout(function(){fw(gColor);},1300);
    setTimeout(function(){fw(gColor);},2200);

    setTimeout(function(){
      if(mates.length>0){
        var mb=document.getElementById('matesBox');
        var ml=document.getElementById('matesList');
        mb.style.border='1px solid '+gColor+'44';
        var allInGroup=RESULTS.filter(function(r){return r.groupIdx===gIdx;}).map(function(r){return r.team;});
        var teamList=allInGroup.length?allInGroup:mates;
        teamList.forEach(function(name,i){
          var row=document.createElement('div'); row.className='mate-row';
          row.style.background=gBg;
          row.style.border='1px solid '+gColor+'33';
          var icon=name===teamName?'⭐':'🏓';
          var tag=name===teamName?' <span style="font-size:.7rem;opacity:.55;">(du)</span>':'';
          row.innerHTML='<span>'+icon+'</span>'+name+tag;
          ml.appendChild(row);
          setTimeout(function(){row.classList.add('visible');}, i*2000);
        });
        // other groups
        var panel=document.getElementById('otherGroupsPanel');
        if(panel){panel.innerHTML='';GNAMES.forEach(function(gn,gi){if(gi===gIdx)return;var gc=COLORS[gi],gbg=BG[gi];var div=document.createElement('div');div.className='og-group';div.style.background=gbg;var head=document.createElement('div');head.className='og-head';head.style.color=gc;head.textContent=String.fromCharCode(65+gi)+' – '+gn;div.appendChild(head);RESULTS.filter(function(r){return r.groupIdx===gi;}).forEach(function(r){var row=document.createElement('div');row.className='og-team';row.innerHTML='<span>🏓</span>'+r.team;div.appendChild(row);});panel.appendChild(div);});}
        mb.style.display='block';
      }
    }, 900);
  }

  window.toggleOtherGroups = function(btn) {
    var panel = document.getElementById('otherGroupsPanel');
    if (!panel) return;
    var visible = panel.style.display === 'block';
    panel.style.display = visible ? 'none' : 'block';
    btn.textContent = visible ? '👁 Andere Gruppen anzeigen' : '🙈 Andere Gruppen verbergen';
  };

  window.resetPage = function(){
    leverPulled = false; currentEntry = null;
    document.getElementById('resultArea').style.display    = 'none';
    document.getElementById('machineScreen').style.display = 'none';
    document.getElementById('selectorBox').style.display   = 'flex';
    coinInserted=true;
    var csw2=document.getElementById('coinSlotWrap');if(csw2){csw2.classList.remove('coin-ready','coin-inserted');}
    var cl2=document.getElementById('coinLabel');if(cl2){cl2.textContent='🪙 INSERT COIN';}
    var td2=document.getElementById('teamDisplay');if(td2){td2.style.display='none';}
    var p2=document.getElementById('otherGroupsPanel');if(p2){p2.style.display='none';p2.innerHTML='';}
    document.getElementById('matesList').innerHTML  = '';
    document.getElementById('matesBox').style.display = 'none';
    document.getElementById('reel').innerHTML = '';
    document.getElementById('teamSelect').value = '';
    document.getElementById('goBtn').disabled = true;
    var lw = document.getElementById('leverWrap');
    lw.classList.remove('pulled','locked');
    document.getElementById('leverHint').style.display = '';
    document.getElementById('spinStatus').textContent = '👆 Zieh den Hebel!';
    document.getElementById('countdownWrap').style.display = 'none';
    document.getElementById('progCircle').style.strokeDashoffset = '0';
  };

  function fw(c){
    var el=document.getElementById('fwc');
    var cols=[c,'#ffd700','#ff4500','#fff','#ff69b4','#00bfff'];
    var cx=10+Math.random()*80,cy=5+Math.random()*55;
    for(var i=0;i<55;i++){
      var p=document.createElement('div');p.className='fw';
      var a=(i/55)*Math.PI*2,d=80+Math.random()*150;
      p.style.cssText='left:'+cx+'%;top:'+cy+'%;background:'+cols[~~(Math.random()*cols.length)]+';width:'+(3+Math.random()*5)+'px;height:'+(3+Math.random()*5)+'px;--tx:'+Math.cos(a)*d+'px;--ty:'+Math.sin(a)*d+'px;animation-duration:'+(0.8+Math.random()*0.7)+'s;animation-delay:'+Math.random()*0.3+'s;';
      el.appendChild(p);setTimeout(function(){p.remove();},2500);
    }
  }
})();
</script>
